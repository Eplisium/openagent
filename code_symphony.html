<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Code Symphony - Song Out of Code 🎵</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff88;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #00ff88; }
            to { text-shadow: 0 0 30px #00ff88, 0 0 40px #00ff88; }
        }

        .controls {
            margin: 30px 0;
        }

        button {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            border: none;
            color: #000;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 25px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .visualizer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .note {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #00ff88, #00cc6a);
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.8);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-100px) rotate(180deg); opacity: 0.7; }
        }

        .code-display {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            font-size: 0.9em;
            max-width: 600px;
            text-align: left;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .frequency-display {
            font-size: 1.5em;
            color: #00ff88;
            margin: 15px 0;
            font-weight: bold;
        }

        .status {
            margin: 10px 0;
            font-size: 1.1em;
            color: #ffaa00;
        }
    </style>
</head>
<body>
    <div class="visualizer" id="visualizer"></div>
    
    <div class="container">
        <h1>🎵 Code Symphony 🎵</h1>
        <p>A musical journey through the frequencies of code</p>
        
        <div class="controls">
            <button onclick="playCodeSong()">▶️ Play Code Song</button>
            <button onclick="stopSong()">⏹️ Stop</button>
            <button onclick="playRandomMelody()">🎲 Random Melody</button>
        </div>
        
        <div class="status" id="status">Ready to play...</div>
        <div class="frequency-display" id="frequency"></div>
        
        <div class="code-display" id="codeDisplay">
            <strong>🎼 Musical Code Algorithm:</strong><br>
            <code>
function codeToMusic(code) {<br>
&nbsp;&nbsp;let frequency = 0;<br>
&nbsp;&nbsp;for (let char of code) {<br>
&nbsp;&nbsp;&nbsp;&nbsp;frequency += char.charCodeAt(0);<br>
&nbsp;&nbsp;}<br>
&nbsp;&nbsp;return (frequency % 800) + 200; // 200-1000Hz<br>
}
            </code>
        </div>
    </div>

    <script>
        let audioContext;
        let isPlaying = false;
        let currentOscillator = null;
        let gainNode = null;

        // Initialize audio context
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioContext.createGain();
                gainNode.connect(audioContext.destination);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            }
        }

        // Convert code/text to musical frequency
        function codeToFrequency(text) {
            let sum = 0;
            for (let i = 0; i < text.length; i++) {
                sum += text.charCodeAt(i) * (i + 1); // Weight by position
            }
            return (sum % 800) + 200; // Range: 200-1000 Hz
        }

        // Play a single note
        function playNote(frequency, duration = 500) {
            initAudio();
            
            if (currentOscillator) {
                currentOscillator.stop();
            }
            
            currentOscillator = audioContext.createOscillator();
            currentOscillator.connect(gainNode);
            currentOscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
            currentOscillator.type = 'sine';
            
            // Add some vibrato
            const vibrato = audioContext.createOscillator();
            const vibratoGain = audioContext.createGain();
            vibrato.frequency.setValueAtTime(6, audioContext.currentTime);
            vibratoGain.gain.setValueAtTime(10, audioContext.currentTime);
            vibrato.connect(vibratoGain);
            vibratoGain.connect(currentOscillator.frequency);
            
            currentOscillator.start();
            vibrato.start();
            
            setTimeout(() => {
                if (currentOscillator) {
                    currentOscillator.stop();
                    vibrato.stop();
                }
            }, duration);
            
            // Update display
            document.getElementById('frequency').textContent = `♪ ${frequency.toFixed(1)} Hz ♪`;
            
            // Create visual note
            createVisualNote();
        }

        // Create floating visual notes
        function createVisualNote() {
            const note = document.createElement('div');
            note.className = 'note';
            note.style.left = Math.random() * window.innerWidth + 'px';
            note.style.top = window.innerHeight + 'px';
            note.style.animationDelay = Math.random() * 2 + 's';
            
            document.getElementById('visualizer').appendChild(note);
            
            setTimeout(() => {
                note.remove();
            }, 3000);
        }

        // Play the main code song
        async function playCodeSong() {
            if (isPlaying) return;
            
            isPlaying = true;
            document.getElementById('status').textContent = '🎵 Playing Code Symphony...';
            
            // Song based on programming concepts
            const codeLines = [
                'function hello()',
                'let x = 42;',
                'if (true) {',
                'console.log("Hello World");',
                'for (i = 0; i < 10; i++)',
                'return result;',
                '}',
                'class Music {',
                'constructor() {}',
                'play() { return "🎵"; }',
                '}'
            ];
            
            for (let i = 0; i < codeLines.length && isPlaying; i++) {
                const line = codeLines[i];
                const frequency = codeToFrequency(line);
                const duration = 600 + (line.length * 20); // Longer lines = longer notes
                
                document.getElementById('codeDisplay').innerHTML = 
                    `<strong>🎼 Now Playing:</strong><br><code style="color: #00ff88;">${line}</code>`;
                
                playNote(frequency, duration);
                await new Promise(resolve => setTimeout(resolve, duration + 100));
            }
            
            if (isPlaying) {
                document.getElementById('status').textContent = '✨ Symphony Complete!';
                document.getElementById('codeDisplay').innerHTML = 
                    `<strong>🎼 Musical Code Algorithm:</strong><br>
                    <code>
function codeToMusic(code) {<br>
&nbsp;&nbsp;let frequency = 0;<br>
&nbsp;&nbsp;for (let char of code) {<br>
&nbsp;&nbsp;&nbsp;&nbsp;frequency += char.charCodeAt(0);<br>
&nbsp;&nbsp;}<br>
&nbsp;&nbsp;return (frequency % 800) + 200; // 200-1000Hz<br>
}
                    </code>`;
                isPlaying = false;
            }
        }

        // Play random melody
        async function playRandomMelody() {
            if (isPlaying) return;
            
            isPlaying = true;
            document.getElementById('status').textContent = '🎲 Playing Random Code Melody...';
            
            const randomWords = [
                'algorithm', 'binary', 'compile', 'debug', 'execute',
                'function', 'github', 'hash', 'iterate', 'javascript',
                'kernel', 'lambda', 'memory', 'node', 'object',
                'parse', 'query', 'recursive', 'stack', 'thread'
            ];
            
            for (let i = 0; i < 8 && isPlaying; i++) {
                const word = randomWords[Math.floor(Math.random() * randomWords.length)];
                const frequency = codeToFrequency(word);
                const duration = 400;
                
                document.getElementById('codeDisplay').innerHTML = 
                    `<strong>🎲 Random Word:</strong><br><code style="color: #ffaa00;">${word}</code>`;
                
                playNote(frequency, duration);
                await new Promise(resolve => setTimeout(resolve, duration + 50));
            }
            
            if (isPlaying) {
                document.getElementById('status').textContent = '🎉 Random melody complete!';
                isPlaying = false;
            }
        }

        // Stop the song
        function stopSong() {
            isPlaying = false;
            if (currentOscillator) {
                currentOscillator.stop();
                currentOscillator = null;
            }
            document.getElementById('status').textContent = '⏹️ Stopped';
            document.getElementById('frequency').textContent = '';
        }

        // Easter egg: Click on title to play a special tune
        document.querySelector('h1').addEventListener('click', async function() {
            if (isPlaying) return;
            
            isPlaying = true;
            document.getElementById('status').textContent = '🎁 Easter Egg Melody!';
            
            // Play a simple scale
            const scale = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25]; // C major scale
            
            for (let freq of scale) {
                if (!isPlaying) break;
                playNote(freq, 300);
                await new Promise(resolve => setTimeout(resolve, 350));
            }
            
            isPlaying = false;
            document.getElementById('status').textContent = '✨ Easter egg complete!';
        });

        // Welcome message
        console.log('🎵 Welcome to Code Symphony! 🎵');
        console.log('This program converts code into music using character frequencies!');
        console.log('Try clicking the title for a surprise! 🎁');
    </script>
</body>
</html>
